name: JavaScript CI

on:
  push:
    branches:
      - '*'
      - '!main'
    paths-ignore:
      - 'CHANGES*'
      - 'Doc/**'
      - 'appveyor.yml'


permissions:
  contents: read

jobs:
  build:

    runs-on: ${{ matrix.os || 'ubuntu-22.04' }}

    # By default, the name of the build is the language used and SWIG options, but matrix entries
    # can define the additional "desc" field with any additional information to include in the name.
    name: ${{ matrix.SWIGLANG || 'none' }}${{ matrix.PY2 }} ${{matrix.desc || format('{0} {1}{2} {3}', matrix.ENGINE, matrix.VER, matrix.ASAN && ' ASAN', matrix.SWIG_FEATURES)}} ${{matrix.compiler}} ${{matrix.GCC}} ${{matrix.CPPSTD}} ${{matrix.CSTD}}

    strategy:
      matrix:
        include:
        - SWIGLANG: ""
          CPPFLAGS: "-DDOH_POISON"
        - SWIGLANG: ""
          GCC: 9
        - SWIGLANG: ""
          GCC: 10
        - SWIGLANG: ""
          GCC: 11
        - SWIGLANG: ""
          GCC: 12
          os: ubuntu-22.04
        - SWIGLANG: ""
          GCC: 13
          os: ubuntu-22.04
        - SWIGLANG: ""
          compiler: clang
          os: ubuntu-22.04
        - SWIGLANG: csharp
        - SWIGLANG: d
          VER: 'ldc'
          CPPSTD: c++14
        - SWIGLANG: d
          VER: 'gdmd'
          CPPSTD: c++11
        - SWIGLANG: d
          VER: '2.103.1'
          CPPSTD: c++17
        - SWIGLANG: go
          VER: '1.20'
          CSTD: gnu11
        - SWIGLANG: go
          VER: '1.24'
          CSTD: gnu99 # Go 1.24 doesn't build with -Wdeclaration-after-statement
        - SWIGLANG: guile
        - SWIGLANG: guile
          VER: '2.2'
        - SWIGLANG: guile
          VER: '3.0'
        - SWIGLANG: java
        - SWIGLANG: javascript
          ENGINE: jsc
          VER: '4.0'
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '20'
          CPPSTD: c++11
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20          
          CPPFLAGS: -DSWIG_NAPI_USE_BASIC_FINALIZERS
          desc: Basic Finalizers
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          ASAN: 1
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: node
          VER: '12'
          CPPSTD: c++11
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          SWIG_FEATURES: -async -w470
          desc: async
          cacheid: -napi-async
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          SWIG_FEATURES: -async -async-locking -DSWIG_NAPI_FULL_LOCKING=1
          ASAN: 1
          desc: async+ASAN
          cacheid: -napi-async-locked-asan
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          SWIG_FEATURES: -async -async-locking -DSWIG_NAPI_FULL_LOCKING=1
          desc: async+lock
          cacheid: -napi-async-locked
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          SWIG_FEATURES: -typescript
          desc: TypeScript
          cacheid: -napi-typescript
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          SWIG_FEATURES: -typescript -async -w470
          desc: TS+async
          cacheid: -napi-typescript-async
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          SWIG_FEATURES: -split
          desc: split
          cacheid: -napi-splitting
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          SWIG_FEATURES: -split -async -async-locking -DSWIG_NAPI_FULL_LOCKING=1
          desc: async+split
          cacheid: -napi-splitting-async
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          COMPILER: emscripten
          cacheid: -napi-wasm
          os: ubuntu-24.04
        - SWIGLANG: javascript
          ENGINE: napi
          VER: '24'
          CPPSTD: c++20
          COMPILER: emscripten
          SWIG_FEATURES: -async -async-locking -DSWIG_NAPI_FULL_LOCKING=1
          desc: async
          cacheid: -napi-wasm-async
          os: ubuntu-24.04
        - SWIGLANG: lua
        - SWIGLANG: octave
          CPPSTD: c++11
        - SWIGLANG: perl5
        - SWIGLANG: php
          VER: '8.3'
          CPPSTD: c++11
        - SWIGLANG: python
          PY2: 2
        - SWIGLANG: python
          VER: '3.10'
        - SWIGLANG: python
          VER: '3.12'
          CSTD: gnu99
        - SWIGLANG: python
          PY2: 2
          SWIG_FEATURES: -builtin
        - SWIGLANG: r
          os: ubuntu-24.04
        - SWIGLANG: ruby
          VER: '2.0'
        - SWIGLANG: scilab
          VER: '6.0.2'
        - SWIGLANG: tcl
        # c++11 testing
        - SWIGLANG: csharp
          CPPSTD: c++11
        - SWIGLANG: guile
          CPPSTD: c++11
        - SWIGLANG: java
          CPPSTD: c++11
        - SWIGLANG: javascript
          ENGINE: jsc
          VER: '4.1'
          os: ubuntu-22.04
          CPPSTD: c++11
        - SWIGLANG: javascript
          ENGINE: node
          VER: '14'
          CPPSTD: c++11
        - SWIGLANG: javascript
          ENGINE: node
          VER: '16'
          CPPSTD: c++14
        - SWIGLANG: java
          CPPSTD: c++17
          GCC: 13
        - SWIGLANG: javascript
          ENGINE: node
          VER: '18'
          CPPSTD: c++17
          GCC: 13
        - SWIGLANG: javascript
          ENGINE: node
          VER: '20'
          CPPSTD: c++20
          GCC: 13
          os: ubuntu-24.04
        #- SWIGLANG: ocaml
        #  CPPSTD: c++17
        #  GCC: 13
        #  continue-on-error: true
        #  os: ubuntu-18.04 # ocaml-4.08 in ubuntu-20.04 not yet working
      # Run all of them, as opposed to aborting when one fails
      fail-fast: false

    env:
      SWIGLANG: ${{ matrix.SWIGLANG }}
      compiler: ${{ matrix.compiler }}
      PY2: ${{ matrix.PY2 }}
      VER: ${{ matrix.VER }}
      ENGINE: ${{ matrix.ENGINE }}
      SWIG_FEATURES: ${{ matrix.SWIG_FEATURES }}
      GCC: ${{ matrix.GCC }}
      CSTD: ${{ matrix.CSTD }}
      CPPSTD: ${{ matrix.CPPSTD }}
      CPPFLAGS: ${{ matrix.CPPFLAGS }}
      PY_ABI_VER: ${{ matrix.PY_ABI_VER }}
      ASAN: ${{ matrix.ASAN }}
      RELOCATABLE: ${{ matrix.RELOCATABLE }}

    steps:
    - name: Machine Info
      run: |
          echo "nproc..."
          nproc --all
          echo "uname..."
          uname --all
          echo "meminfo..."
          cat /proc/meminfo
          echo "lsb-release..."
          cat /etc/lsb-release

    - name: Checkout
      uses: actions/checkout@v6
      with:
        show-progress: false
        submodules: recursive

    - name: Install CCache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ matrix.os || 'ubuntu-22.04' }}-${{ matrix.compiler || 'gcc' }}${{ matrix.GCC }}${{ matrix.cacheid }}

# Uncomment to debug via ssh, see https://github.com/mxschmitt/action-tmate
#    - name: Setup tmate session
#      uses: mxschmitt/action-tmate@v3

    - name: Install Dependencies
      run: |
          set -x
          source $GITHUB_WORKSPACE/Tools/GHA-linux-install.sh

          cpu_count=$(nproc)
          if test $cpu_count -gt 1; then
            echo SWIGJOBS=-j$cpu_count >> $GITHUB_ENV
          fi

    - name: Configure
      run: |
          source $GITHUB_WORKSPACE/Tools/CI-linux-environment.sh
          set -x

          if test -z "$CSTD"; then
            case "$CPPSTD" in
              c++11) CSTD=c11 ;;
              c++14) CSTD=c11 ;;
              c++17) CSTD=c17 ;;
              c++20) CSTD=c17 ;;
            esac
            if test -n "$CSTD"; then echo "CSTD=$CSTD" >> $GITHUB_ENV; fi
          fi
          if test -n "$CPPSTD"; then
            CONFIGOPTS+=("CXXFLAGS=-std=$CPPSTD $CXXFLAGS")
            echo "Use C++ standard $CPPSTD"
          else
            CONFIGOPTS+=("--disable-cpp11-testing")
            $CXX -x c++ -dM -E - < /dev/null | grep __cplusplus
          fi
          if test -n "$CSTD"; then
            CONFIGOPTS+=("CFLAGS=-std=$CSTD $CFLAGS")
            echo "Use C standard $CSTD"
          else
            $CC -dM -E - < /dev/null | grep __STDC_VERSION__
          fi
          if test -n "$SWIGLANG"; then CONFIGOPTS+=(--without-alllang --with-$WITHLANG); fi
          if test "$PY2" = "2"; then CONFIGOPTS+=(--with-python=python2 --without-python3); fi
          if test -n "$RELOCATABLE"; then CONFIGOPTS+=(--with-swiglibdir=swiglib --enable-relocatable); fi
          echo "${CONFIGOPTS[@]}"
          ./autogen.sh && mkdir -p build/build && cd build/build && ../../configure "${CONFIGOPTS[@]}"

    - name: Build
      working-directory: build/build
      run: |
          set -x
          make -s $SWIGJOBS
          ./swig -version && ./swig -pcreversion

    - name: Test
      working-directory: build/build
      run: |
          source $GITHUB_WORKSPACE/Tools/CI-linux-environment.sh
          set -x

          if test -n "$RELOCATABLE"; then
            if ! test "`./swig -swiglib`" = "`pwd`/swiglib"; then
              exit 1
            fi
          fi

          if test -z "$SWIGLANG"; then
            make $SWIGJOBS check-ccache
            make $SWIGJOBS check-errors-test-suite
          else
            case "$SWIGLANG" in
              ocaml)
                # `make check-ocaml-test-suite` fails with parallel make with:
                #
                # File "swig.ml", line 1:
                # Error: Could not find the .cmi file for interface swig.mli.
                #
                # Apparently we ought to be using `ocamldep` to generate make
                # dependencies.
                unset SWIGJOBS
                ;;
              scilab)
                case $VER in
                  ""|6.*|2023.*|2024.0.*|2024.1.*)
                    # Some older versions of scilab sporadically fail with:
                    # terminate called after throwing an instance of 'std::filesystem::__cxx11::filesystem_error'
                    # #2942 says that it was probably introduced in 6.x (we've
                    # seen it with 6.1.0.0, but haven't with 5.x); it also says
                    # "this issue was fixed in Scilab 2024.1.0" but we are
                    # still seeing sporadic failures with that version.
                    unset SWIGJOBS
                    ;;
                esac
                ;;
            esac

            # Stricter compile flags for examples. Various headers and SWIG generated code prevents full use of -pedantic.
            cflags="$($GITHUB_WORKSPACE/Tools/testflags.py --language $SWIGLANG --cflags --std=$CSTD --compiler=$CC)"
            cxxflags="$($GITHUB_WORKSPACE/Tools/testflags.py --language $SWIGLANG --cxxflags --std=$CPPSTD --compiler=$CC)"
            make check-$SWIGLANG-version
            make check-$SWIGLANG-enabled
            make $SWIGJOBS check-$SWIGLANG-examples CFLAGS="$cflags" CXXFLAGS="$cxxflags" PY_ABI_VER="$PY_ABI_VER"
            make $SWIGJOBS check-$SWIGLANG-test-suite CC="$TARGET_CC" CXX="$TARGET_CXX" CFLAGS="$cflags" CXXFLAGS="$cxxflags" PY_ABI_VER="$PY_ABI_VER"
          fi

    - name: Install
      working-directory: build/build
      run: |
          set -x
          if test -z "$SWIGLANG"; then sudo make install && swig -version && ccache-swig -V; fi

    - name: Clean
      working-directory: build/build
      run: |
          set -x
          make check-maintainer-clean && ../../configure
